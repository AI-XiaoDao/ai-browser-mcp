name: Upload Social Preview

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload-cover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright Chromium
        run: npm install --no-save playwright@1.49.1 && npx playwright install chromium

      - name: Upload social preview via Playwright
        env:
          GH_USER: AI-XiaoDao
          GH_PAT: ${{ secrets.UPLOAD_PAT }}
          REPO: AI-XiaoDao/ai-browser-mcp
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');
          const imagePath = path.resolve('.github/social-preview.jpg');
          const repo = process.env.REPO;
          const user = process.env.GH_USER;
          const pat = process.env.GH_PAT;

          async function loginIfNeeded(page) {
            await page.goto('https://github.com/login', { waitUntil: 'domcontentloaded', timeout: 60000 });
            if (!page.url().includes('/login')) return;
            await page.fill('input#login_field', user);
            await page.fill('input#password', pat);
            await page.click('input[name="commit"]');
            await page.waitForURL((url) => !url.toString().includes('/login'), { timeout: 60000 });
            const html = await page.content();
            if (html.includes('Incorrect username or password') || html.includes('Authentication failed')) {
              throw new Error('GitHub web login failed with PAT');
            }
          }

          async function main() {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext();
            const page = await context.newPage();
            try {
              await loginIfNeeded(page);
              const settingsUrl = `https://github.com/${repo}/settings`;
              await page.goto(settingsUrl, { waitUntil: 'domcontentloaded', timeout: 60000 });
              if (page.url().includes('/login')) throw new Error('still on login after auth');

              const heading = page.locator('h2', { hasText: 'Social preview' }).first();
              await heading.waitFor({ state: 'attached', timeout: 30000 });
              await heading.scrollIntoViewIfNeeded();

              const editBtn = page.locator('#edit-social-preview-button');
              const editSummary = page.locator('xpath=//h2[normalize-space()="Social preview"]/following::*[(self::button or self::summary) and normalize-space(.)="Edit"][1]');
              if (await editBtn.count()) await editBtn.first().click({ force: true });
              else if (await editSummary.count()) await editSummary.first().click({ force: true });

              const fileInput = page.locator('input#repo-image-file-input');
              const uploadMenu = page.getByText(/upload an image/i).first();
              await Promise.any([
                fileInput.first().waitFor({ state: 'attached', timeout: 20000 }),
                uploadMenu.waitFor({ state: 'visible', timeout: 20000 }),
              ]);

              const uploadResponse = page.waitForResponse((resp) => {
                const u = resp.url();
                return resp.status() >= 200 && resp.status() < 300 && u.includes('/upload/repository-images/');
              }, { timeout: 30000 }).catch(() => null);

              if (await fileInput.count()) {
                await fileInput.first().setInputFiles(imagePath);
              } else {
                const [chooser] = await Promise.all([
                  page.waitForEvent('filechooser'),
                  uploadMenu.click({ force: true }),
                ]);
                await chooser.setFiles(imagePath);
              }

              const resp = await uploadResponse;
              if (resp) console.log('upload response', resp.status(), resp.url());

              await page.waitForFunction(() => {
                const input = document.querySelector('input.js-repository-image-id');
                return !!((input?.value || '').trim());
              }, { timeout: 30000 });

              console.log('social preview uploaded');
            } finally {
              await browser.close();
            }
          }

          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

      - name: Verify
        env:
          GH_TOKEN: ${{ secrets.UPLOAD_PAT }}
        run: |
          sleep 5
          gh api graphql -f query='query { repository(owner:"AI-XiaoDao", name:"ai-browser-mcp") { usesCustomOpenGraphImage openGraphImageUrl } }'
