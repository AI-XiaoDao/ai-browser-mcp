<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MCP Test Fixture</title>
<style>
  body { font-family: sans-serif; padding: 16px; }
  #mcp-status { color: green; }
</style>
</head>
<body>
  <h1 id="mcp-title">MCP Scenario Test Page</h1>
  <p id="mcp-status" data-role="status">ready</p>
  <input id="mcp-test-input" type="text" value="" placeholder="type here" />
  <select id="mcp-test-select">
    <option value="a">Option A</option>
    <option value="b" selected>Option B</option>
  </select>
  <button id="mcp-test-btn" type="button">Click Me</button>
  <div id="mcp-click-count">0</div>
  <script>
    document.getElementById('mcp-test-btn').addEventListener('click', function () {
      var el = document.getElementById('mcp-click-count');
      el.textContent = String(parseInt(el.textContent || '0', 10) + 1);
    });
  </script>
</body>
</html>
